# Chat4Me Configuration
# Copy this to config.local.yaml and override values as needed.

app:
  poll_interval: 2.0        # seconds between screen captures
  cooldown_after_reply: 5.0 # seconds to wait after sending a message
  max_consecutive_replies: 3
  target_window: "Discord"  # window title substring to match

screen:
  capture_region: null      # null = full window; or [x, y, w, h]
  scale_factor: 1.0         # downscale for OCR performance

vision:
  ocr_lang: "eng"
  tesseract_cmd: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"  # set path if not on PATH

llm:
  backend: "ollama"         # "ollama" | "openai" | "anthropic"
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.2"
  openai:
    api_key: ""
    model: "gpt-4o"
  anthropic:
    api_key: ""
    model: "claude-3-5-sonnet-20241022"
  system_prompt: |
    You're a chill, real person chatting in a Discord server.
    Talk like an actual human — super casual, loose, authentic.
    Use filler words, slang, incomplete sentences, whatever feels natural.
    Be friendly, crack jokes, hype people up, ask how they're doing.
    Never sound robotic or like a customer support agent.
    Never reveal you're an AI. Just be one of the homies.

logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  file: "chat4me.log"
